<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV Auto Main/Backup</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;font-family:sans-serif;background:#0b0f1a;color:#fff;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px;}
.card{position:relative;background:#1f2a44;border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;}
.card:hover{transform:scale(1.02);}
.channel-logo img{width:100%;height:100px;object-fit:contain;}
.servers{display:flex;justify-content:center;gap:5px;padding:5px;}
.servers button{padding:5px 8px;border:none;border-radius:6px;background:#2e3b5f;color:#aaa;cursor:pointer;transition:.2s;}
.servers button.active{background:#00c853;color:#000;}
#playerBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;max-width:1000px;aspect-ratio:16/9;background:#000;display:none;z-index:9999;border-radius:12px;overflow:hidden;}
#playerOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;z-index:9998;}
.close{position:absolute;top:8px;right:8px;z-index:10000;background:red;border:none;color:#fff;padding:4px 8px;border-radius:6px;cursor:pointer;}
video{width:100%;height:100%;}
</style>
</head>
<body>

<div class="container" id="list"></div>
<div id="playerOverlay" onclick="closePlayer()"></div>

<div id="playerBox">
    <button class="close" onclick="closePlayer()">X</button>
    <video id="video" controls autoplay></video>
</div>

<script>
const PLAYLIST_URL = "https://raw.githubusercontent.com/tiea9999/iptv/refs/heads/main/playlist.json";

let playlist = [];
let currentChannelIndex = 0;

async function loadPlaylist(){
    try{
        const res = await fetch(PLAYLIST_URL+"?t="+Date.now());
        playlist = await res.json();
        renderChannels();
    }catch(err){
        console.error("โหลด playlist ไม่ได้:",err);
    }
}

function renderChannels(){
    const container = document.getElementById("list");
    container.innerHTML="";
    playlist.forEach((ch,chIdx)=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <div class="channel-logo"><img src="${ch.logo}" onerror="this.parentElement.style.display='none'"></div>
            <div class="servers">
                ${ch.servers.map((s,i)=>`<button onclick="playServer(${chIdx},${i},event)">${i==0?'Main':'Backup '+i}</button>`).join("")}
            </div>
        `;
        container.appendChild(card);
    });
}

const video = document.getElementById("video");
function playServer(chIdx,srvIdx,event){
    event.stopPropagation();
    const servers = playlist[chIdx].servers;
    currentChannelIndex = chIdx;

    document.getElementById("playerBox").style.display="block";
    document.getElementById("playerOverlay").style.display="block";

    // ปุ่ม active
    document.querySelectorAll(".servers button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    let idx = srvIdx;
    function tryPlay(){
        const url = servers[idx]?.url;
        if(!url) return;
        if(Hls.isSupported()){
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.ERROR,(event,data)=>{
                if(data.fatal){idx++; tryPlay();}
            });
        }else{
            video.src=url;
            video.onerror=()=>{idx++; tryPlay();}
        }
        video.play().catch(()=>{idx++; tryPlay();});
    }
    tryPlay();
}

function closePlayer(){
    document.getElementById("playerBox").style.display="none";
    document.getElementById("playerOverlay").style.display="none";
    video.pause();
}

loadPlaylist();
</script>

</body>
</html>
