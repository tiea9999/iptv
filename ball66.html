<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หรรมน้อย ออนไลน์</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* (ตัด style เดิมไว้ครบ) */
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif;}
.container{max-width:1400px;margin:0 auto;padding:10px 16px;}
.section-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:10px;}
.card{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:16/9;cursor:pointer;background:rgba(255,255,255,0.06);}
#playerBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;max-width:1000px;aspect-ratio:16/9;background:#000;display:none;z-index:9999;}
#playerOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;z-index:9998;}
video{width:100%;height:100%;}
</style>
</head>

<body>

<div id="list" class="container"></div>
<div id="playerOverlay" onclick="closePlayer()"></div>

<div id="playerBox">
    <button onclick="closePlayer()">X</button>
    <video id="video" controls autoplay></video>
</div>

<script>

// 🔥 เปลี่ยนตรงนี้แล้ว
const URL = "https://sparkling-river-40f9.tawatchai250958.workers.dev/list";

let all = [];

async function load(){
    const res = await fetch(URL);
    const json = await res.json();
    all = parse(json);
    render();
}

function parse(data){
    let arr=[];

    for(const g of data.groups){
        arr.push({
            title:g.name,
            servers:g.stations
        });
    }

    return arr;
}

function render(){
    const list = document.getElementById("list");
    list.innerHTML="";

    all.forEach(m=>{
        const card = document.createElement("div");
        card.className="card";

        card.innerHTML = `
            <div style="padding:10px">${m.title}</div>
            <div>
                ${(m.servers||[]).map((s,i)=>`
                    <button data-url="${s.url}">${i==0?'HD':'สำรอง'}</button>
                `).join("")}
            </div>
        `;

        card.onclick = ()=>play(m.servers?.[0]?.url);

        const buttons = card.querySelectorAll("button");
        buttons.forEach(btn=>{
            btn.addEventListener("click", (e)=>{
                e.stopPropagation();
                play(btn.dataset.url);
            });
        });

        list.appendChild(card);
    });
}

const video=document.getElementById("video");

function play(url){
    document.getElementById("playerBox").style.display="block";
    document.getElementById("playerOverlay").style.display="block";

    if(Hls.isSupported()){
        const hls=new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }else{
        video.src=url;
    }
}

function closePlayer(){
    document.getElementById("playerBox").style.display="none";
    document.getElementById("playerOverlay").style.display="none";
    video.pause();
}

load();

</script>

</body>
</html>
